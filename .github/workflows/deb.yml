name: build-deb

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native build and browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev patchelf tesseract-ocr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python runtime and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pyinstaller wasmtime
          python -m pip install playwright pytesseract
          python -m playwright install --with-deps chromium

      - name: Build self-contained NEMESIS executable
        run: |
          python -m PyInstaller --clean --noconfirm dulus.spec
          test -x dist/nemesis

      - name: Build Debian package
        env:
          DEB_ARCH: amd64
        run: |
          chmod +x packaging/build-deb.sh
          VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          packaging/build-deb.sh "$VERSION"
          dpkg-deb --info dist/nemesis_*.deb
          dpkg-deb --contents dist/nemesis_*.deb | grep -E 'opt/nemesis/(nemesis|playwright-browsers)|usr/bin/nemesis'

      - name: Smoke-test package contents
        run: |
          mkdir -p /tmp/nemesis-package-test
          dpkg-deb -x dist/nemesis_*.deb /tmp/nemesis-package-test
          test -x /tmp/nemesis-package-test/opt/nemesis/nemesis
          test -x /tmp/nemesis-package-test/usr/bin/nemesis
          test -d /tmp/nemesis-package-test/opt/nemesis/playwright-browsers
          /tmp/nemesis-package-test/opt/nemesis/nemesis --version

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: nemesis-linux-amd64-deb
          path: dist/nemesis_*.deb

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/nemesis_*.deb
          generate_release_notes: true
